services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: report_forge_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d report_forge_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/reportforge-artifacts &&
      mc anonymous set none local/reportforge-artifacts
      "

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "4318:4318"
    volumes:
      - ./ops/otel/collector.yml:/etc/otelcol/config.yml:ro

  reportforge:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      BASE_URL: http://localhost:4000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PHX_SERVER: "true"
      PORT: "4000"
      REPORT_FORGE_ARTIFACT_STORAGE_ADAPTER: minio
      REPORT_FORGE_DB_HOST: postgres
      REPORT_FORGE_DB_NAME: report_forge_dev
      REPORT_FORGE_DB_PASSWORD: postgres
      REPORT_FORGE_DB_PORT: "5432"
      REPORT_FORGE_DB_USER: postgres
      REPORT_FORGE_S3_ACCESS_KEY_ID: minioadmin
      REPORT_FORGE_S3_BUCKET: reportforge-artifacts
      REPORT_FORGE_S3_ENDPOINT: http://minio:9000
      REPORT_FORGE_S3_FORCE_PATH_STYLE: "true"
      REPORT_FORGE_S3_PUBLIC_ENDPOINT: http://localhost:9000
      REPORT_FORGE_S3_REGION: us-east-1
      REPORT_FORGE_S3_SECRET_ACCESS_KEY: minioadmin
      SIGNING_SECRET: reportforge-compose-signing-secret
    ports:
      - "4000:4000"
    command: >
      sh -c "
      bin/report_forge eval 'ReportForge.Release.migrate()' &&
      bin/report_forge start
      "

  prometheus:
    image: prom/prometheus:v3.3.0
    depends_on:
      reportforge:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: reportforge
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/architecture/grafana-dashboard.json:/var/lib/grafana/dashboards/reportforge.json:ro
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
  minio-data:
  postgres-data:
  prometheus-data:
