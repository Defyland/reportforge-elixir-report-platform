x-reportforge-environment: &reportforge-environment
  BASE_URL: http://localhost:${REPORT_FORGE_HOST_PORT:-4000}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  PHX_SERVER: "true"
  PORT: "4000"
  REPORT_FORGE_ARTIFACT_STORAGE_ADAPTER: minio
  REPORT_FORGE_DB_HOST: postgres
  REPORT_FORGE_DB_NAME: report_forge_dev
  REPORT_FORGE_DB_PASSWORD: postgres
  REPORT_FORGE_DB_PORT: "5432"
  REPORT_FORGE_DB_USER: postgres
  REPORT_FORGE_S3_ACCESS_KEY_ID: minioadmin
  REPORT_FORGE_S3_BUCKET: reportforge-artifacts
  REPORT_FORGE_S3_ENDPOINT: http://minio:9000
  REPORT_FORGE_S3_FORCE_PATH_STYLE: "true"
  REPORT_FORGE_S3_PUBLIC_ENDPOINT: http://localhost:${REPORT_FORGE_MINIO_PORT:-9000}
  REPORT_FORGE_S3_REGION: us-east-1
  REPORT_FORGE_S3_SECRET_ACCESS_KEY: minioadmin
  SIGNING_SECRET: reportforge-compose-signing-secret

x-reportforge-runtime-hardening: &reportforge-runtime-hardening
  cap_drop:
    - ALL
  cpus: "1.0"
  init: true
  mem_limit: 512m
  pids_limit: 256
  read_only: true
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  postgres:
    image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: report_forge_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d report_forge_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${REPORT_FORGE_MINIO_PORT:-9000}:9000"
      - "${REPORT_FORGE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/reportforge-artifacts &&
      mc anonymous set none local/reportforge-artifacts
      "

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0@sha256:e39311df1f3d941923c00da79ac7ba6269124a870ee87e3c3ad24d60f8aee4d2
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "${REPORT_FORGE_OTEL_PORT:-4318}:4318"
    volumes:
      - ./ops/otel/collector.yml:/etc/otelcol/config.yml:ro

  reportforge-migrate:
    <<: *reportforge-runtime-hardening
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *reportforge-environment
    command: ["bin/report_forge", "eval", "ReportForge.Release.migrate()"]
    restart: "no"

  reportforge:
    <<: *reportforge-runtime-hardening
    build: .
    depends_on:
      reportforge-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    environment:
      <<: *reportforge-environment
    ports:
      - "${REPORT_FORGE_HOST_PORT:-4000}:4000"
    command: ["bin/report_forge", "start"]

  prometheus:
    image: prom/prometheus:v3.3.0@sha256:339ce86a59413be18d0e445472891d022725b4803fab609069110205e79fb2f1
    depends_on:
      reportforge:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${REPORT_FORGE_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.6.0@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: reportforge
    ports:
      - "${REPORT_FORGE_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/architecture/grafana-dashboard.json:/var/lib/grafana/dashboards/reportforge.json:ro
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
  minio-data:
  postgres-data:
  prometheus-data:
