name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository baseline
        run: bash scripts/validate_requirements.sh

  elixir:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      REPORT_FORGE_DB_HOST: 127.0.0.1
      REPORT_FORGE_DB_PORT: 5432
      REPORT_FORGE_DB_USER: postgres
      REPORT_FORGE_DB_PASSWORD: postgres
      REPORT_FORGE_DB_NAME: report_forge_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Sobelow
        run: mix sobelow --skip --exit

      - name: Dependency audit
        run: mix deps.audit

      - name: Migrate database schema
        run: mix ecto.create && mix ecto.migrate

      - name: Test suite with coverage
        run: mix test --cover

      - name: Database integration tests
        run: mix test --only db

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover

  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate OpenAPI
        run: npx @redocly/cli@latest lint openapi.yaml

  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker build
        run: docker build -t reportforge-ci .
