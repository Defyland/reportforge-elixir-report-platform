name: CI

on:
  push:
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository baseline
        run: bash scripts/validate_requirements.sh

  elixir:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      REPORT_FORGE_DB_HOST: 127.0.0.1
      REPORT_FORGE_DB_PORT: 5432
      REPORT_FORGE_DB_USER: postgres
      REPORT_FORGE_DB_PASSWORD: postgres
      REPORT_FORGE_DB_NAME: report_forge_test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict

      - name: Sobelow
        run: mix sobelow --ignore Config.HTTPS --skip --exit

      - name: Dependency audit
        run: mix deps.audit

      - name: Migrate database schema
        run: mix ecto.create && mix ecto.migrate

      - name: Test suite with coverage
        run: mix test --cover

      - name: Database integration tests
        run: mix test --only db

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover

  minio-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      REPORT_FORGE_DB_HOST: 127.0.0.1
      REPORT_FORGE_DB_PORT: 5432
      REPORT_FORGE_DB_USER: postgres
      REPORT_FORGE_DB_PASSWORD: postgres
      REPORT_FORGE_DB_NAME: report_forge_test
      REPORT_FORGE_MINIO_INTEGRATION: "1"
      REPORT_FORGE_S3_ACCESS_KEY_ID: minioadmin
      REPORT_FORGE_S3_BUCKET: reportforge-artifacts
      REPORT_FORGE_S3_ENDPOINT: http://127.0.0.1:9000
      REPORT_FORGE_S3_FORCE_PATH_STYLE: "true"
      REPORT_FORGE_S3_PUBLIC_ENDPOINT: http://127.0.0.1:9000
      REPORT_FORGE_S3_REGION: us-east-1
      REPORT_FORGE_S3_SECRET_ACCESS_KEY: minioadmin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Start MinIO and create bucket
        run: |
          docker run -d --name reportforge-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-04-22T22-12-26Z server /data

          docker run --rm --network host --entrypoint /bin/sh minio/mc:RELEASE.2025-04-16T18-13-26Z \
            -c "until mc alias set local http://127.0.0.1:9000 minioadmin minioadmin; do sleep 1; done && mc mb --ignore-existing local/reportforge-artifacts"

      - name: Prepare database
        run: mix ecto.create && mix ecto.migrate

      - name: Run real MinIO storage integration test
        run: mix test test/report_forge/artifact_storage_minio_integration_test.exs --include minio

  openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate OpenAPI
        run: npx @redocly/cli@latest lint openapi.yaml

  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            README.md
            benchmarks/**/*.md
            docs/**/*.md
            specs/**/*.md

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker build
        run: docker build -t reportforge-ci .

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start production-like stack
        run: docker compose up -d --build

      - name: Run smoke test
        run: BASE_URL=http://localhost:4000 SMOKE_TIMEOUT_SECONDS=120 bash scripts/smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop production-like stack
        if: always()
        run: docker compose down -v
